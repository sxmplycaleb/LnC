<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | LnC Streetwear</title>
  <link rel="icon" href="https://3z8qdlgzk1.ufs.sh/f/ryTwMvEKto8yPUX3YUS2uFD4jNVqJsLIBAHi70Tomd1ghOzW">
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="/"><span class="brand-mark"><img src="https://3z8qdlgzk1.ufs.sh/f/ryTwMvEKto8yPUX3YUS2uFD4jNVqJsLIBAHi70Tomd1ghOzW" alt=""></span><span>LnC Admin</span></a>
    <div>
      <h1>Admin Login</h1>
      <p class="muted">Manage the LnC Streetwear catalog, drops, orders, and revenue desk.</p>
    </div>
    <form id="loginForm" class="form-stack">
      <label>Email<input id="email" type="email" autocomplete="email" required></label>
      <label>Password<input id="password" type="password" autocomplete="current-password" required></label>
      <button class="primary-button" type="submit">Sign In</button>
    </form>
    <p class="error-message" id="loginError" role="alert"></p>
  </main>
  <script src="/admin/admin.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
