<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard | L&C Enterprise</title>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body data-page="dashboard">
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <a class="brand" href="#overview" aria-label="L&C Admin overview">
          <span class="brand-mark">L&C</span>
          <span class="nav-label">Admin</span>
        </a>
        <button class="icon-button sidebar-close" id="mobileSidebarClose" type="button" aria-label="Close sidebar">X</button>
      </div>
      <nav class="nav" id="sidebarNav" aria-label="Admin navigation"></nav>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-button" id="sidebarToggle" type="button" aria-label="Toggle sidebar">=</button>
          <div>
            <p class="breadcrumb" id="breadcrumb">Dashboard / Overview</p>
            <h1 id="pageTitle">Overview</h1>
          </div>
        </div>
        <label class="search-box">
          <span class="visually-hidden">Search admin data</span>
          <input id="globalSearch" type="search" placeholder="Search products, orders, users">
        </label>
        <div class="topbar-right">
          <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle theme">D</button>
          <div class="account-menu" id="accountMenu">
            <button class="avatar-button" id="accountToggle" type="button" aria-label="Open account menu">
              <span id="avatarInitials">AD</span>
            </button>
            <div class="dropdown" id="accountDropdown">
              <a href="#profile">Profile</a>
              <a href="#settings">Settings</a>
              <button id="logoutButton" type="button">Logout</button>
            </div>
          </div>
        </div>
      </header>

      <section class="page-intro">
        <div>
          <h2 class="welcome-greeting" id="welcomeGreeting">Welcome</h2>
          <p class="eyebrow" id="pageSection">Dashboard</p>
          <p class="muted" id="pageSubtitle">Business performance, operations, and alerts at a glance.</p>
        </div>
        <div class="intro-actions" id="pageActions"></div>
      </section>

      <div id="toastRegion" class="toast-region" aria-live="polite"></div>
      <section id="appView" class="view" aria-live="polite"></section>
    </main>
  </div>
  <script src="/admin/admin.js"></script>
</body>
</html>
